<!-- Reading progress bar -->
<div id="reading-progress"></div>

<!-- Subscribe nudge — shown only on single posts -->
<div id="subscribe-nudge" style="display:none;">
  <div class="subscribe-nudge-inner">
    <p class="subscribe-nudge-label">Enjoyed this? Get the next one in your inbox.</p>
    <form
      action="https://buttondown.email/api/emails/embed-subscribe/BUTTONDOWN_USERNAME"
      method="post"
      target="popupwindow"
      onsubmit="window.open('https://buttondown.email/BUTTONDOWN_USERNAME','popupwindow')"
      class="subscribe-nudge-form">
      <input type="email" name="email" placeholder="your@email.com" required>
      <button type="submit">Subscribe →</button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
  (function () {
    // Reading progress bar
    var bar = document.getElementById('reading-progress');
    if (bar) {
      function updateBar() {
        var doc = document.documentElement;
        var scrolled = doc.scrollTop || document.body.scrollTop;
        var total = doc.scrollHeight - doc.clientHeight;
        bar.style.width = total > 0 ? (scrolled / total * 100) + '%' : '0%';
      }
      window.addEventListener('scroll', updateBar, { passive: true });
      updateBar();
    }

    // Show subscribe nudge only on post pages (URL contains /posts/)
    var nudge = document.getElementById('subscribe-nudge');
    if (nudge && window.location.pathname.indexOf('/posts/') !== -1) {
      nudge.style.display = 'block';
    }

    // Mermaid diagrams
    var isDark = document.querySelector('html').dataset.theme === 'dark';
    mermaid.initialize({
      startOnLoad: false,
      theme: isDark ? 'dark' : 'neutral',
      fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif',
      fontSize: 14,
    });

    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('code.language-mermaid').forEach(function (el) {
        var pre = el.closest('pre') || el;
        var div = document.createElement('div');
        div.className = 'mermaid';
        div.textContent = el.textContent;
        div.style.cssText = 'text-align:center;margin:2rem auto;max-width:100%;overflow-x:auto;';
        pre.parentNode.replaceChild(div, pre);
      });
      mermaid.run();
    });
  })();
</script>
