baseURL = "https://swapnil3479-collab.github.io/blog/"
languageCode = "en-us"
title = "Swapnilsblog"
theme = "PaperMod"
paginate = 10

[params]
  author = "Swapnil"
  description = "Deep dives into AI, machine learning, and the systems that power them."
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowShareButtons = false
  ShowToc = true
  defaultTheme = "auto"
  DateFormat = "January 2, 2006"

  [params.assets]
    disableFingerprinting = true

  [params.profileMode]
    enabled = true
    title = "Swapnil"
    subtitle = "Deep dives into AI and machine learning — how models work, how systems are built, and what it all means."
    imageUrl = "https://api.dicebear.com/7.x/initials/svg?seed=Swapnil&backgroundColor=6366f1&textColor=ffffff&fontSize=40"
    imageTitle = "Swapnil"
    imageWidth = 100
    imageHeight = 100

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/swapnil3479-collab"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 20
